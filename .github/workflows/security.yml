name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "gsk_\|sk-\|api_key.*=.*[a-zA-Z0-9]\{20,\}" --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.next . | grep -v ".env" | grep -v ".example" | grep -v "your_"; then
            echo "WARNING: Potential secrets found in source code!"
            exit 1
          else
            echo "No secrets detected in source code."
          fi
